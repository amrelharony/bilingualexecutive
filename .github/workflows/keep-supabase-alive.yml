name: Keep Supabase Alive

on:
  schedule:
    # Runs every 5 days at 08:00 UTC — well within the 7-day pause window
    - cron: '0 8 */5 * *'
  workflow_dispatch: # Allow manual trigger from GitHub Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase database
        env:
          SUPABASE_URL: https://qbgfduhsgrdfonxpqywu.supabase.co
          SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFiZ2ZkdWhzZ3JkZm9ueHBxeXd1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjczNjQ0MzcsImV4cCI6MjA4Mjk0MDQzN30.0FGzq_Vg2oYwl8JZXBrAqNmqTBWUnzJTEAdgPap7up4
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            "${SUPABASE_URL}/rest/v1/guestbook_entries?select=id&limit=1" \
            -H "apikey: ${SUPABASE_ANON_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_ANON_KEY}")

          echo "HTTP Status: $response"

          if [ "$response" -ge 200 ] && [ "$response" -lt 300 ]; then
            echo "✅ Supabase is alive and responding."
          elif [ "$response" -eq 503 ]; then
            echo "⚠️ Database may be paused (503). Visit dashboard to restore:"
            echo "https://supabase.com/dashboard/project/qbgfduhsgrdfonxpqywu"
            exit 1
          else
            echo "❌ Unexpected response: $response"
            exit 1
          fi
